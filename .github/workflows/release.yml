name: Release
on:
  push:
    tags:
      - "v*"

jobs:
  build-and-release:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux Target
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            platform_suffix: linux-x64
          # macOS Intel Target
          - os: macos-latest
            target: x86_64-apple-darwin
            platform_suffix: macos-intel
          # macOS ARM Target
          - os: macos-latest
            target: aarch64-apple-darwin
            platform_suffix: macos-arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build and Package
        run: |
          # Build the release binary
          cargo build --release --target ${{ matrix.target }}

          # Navigate to the output directory
          cd target/${{ matrix.target }}/release

          # Create the versioned tarball
          # Example: command_surfer-v1.0.0-linux-x64.tar.gz
          tar -czf ../../../command_surfer-${{ github.ref_name }}-${{ matrix.platform_suffix }}.tar.gz command_surfer

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: command_surfer-${{ github.ref_name }}-*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
