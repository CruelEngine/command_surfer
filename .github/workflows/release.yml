name: Release
on:
  push:
    tags:
      - "v*"

jobs:
  build-and-release:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            platform_suffix: linux-x64
          - os: macos-latest
            target: x86_64-apple-darwin
            platform_suffix: macos-intel
          - os: macos-latest
            target: aarch64-apple-darwin
            platform_suffix: macos-arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # --- 1. COMPILE ---
      - name: Build Release Binary
        run: cargo build --release --target ${{ matrix.target }}

      # --- 2. MACOS ONLY: PACKAGE TARBALL ---
      - name: Package macOS Tarball
        if: matrix.os == 'macos-latest'
        run: |
          PKG_NAME="command_surfer-${{ github.ref_name }}-${{ matrix.platform_suffix }}.tar.gz"
          tar -czf "$PKG_NAME" -C target/${{ matrix.target }}/release command_surfer

      # --- 3. LINUX ONLY: PACKAGE .DEB & .RPM ---
      - name: Build Linux Installers
        if: matrix.os == 'ubuntu-latest'
        run: |
          cargo install cargo-deb cargo-generate-rpm

          # Build and rename .deb
          cargo deb --target ${{ matrix.target }} --no-build
          mv target/${{ matrix.target }}/debian/*.deb command_surfer-${{ github.ref_name }}.deb

          # Build and rename .rpm
          cargo generate-rpm --target ${{ matrix.target }}
          mv target/${{ matrix.target }}/generate-rpm/*.rpm command_surfer-${{ github.ref_name }}.rpm

      # --- 4. UPLOAD SECTION ---
      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          fail_on_unmatched_files: false
          files: |
            command_surfer-${{ github.ref_name }}-macos-*.tar.gz
            command_surfer-${{ github.ref_name }}.deb
            command_surfer-${{ github.ref_name }}.rpm
          overwrite: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
